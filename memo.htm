---
## 작성 조건

1. 목적 : 블로그 포스트
2. 문장톤 
   1) 과장하지 말고 쿨한톤으로 작성함
   2) 형용사는 최소한으로 사용하여 짧은 문장으로 작성함
   3) 반드시 존댓말로 작성함
   4) 외부사이트 링크는 삭제 함
3. 별점/평점 : ★★★★ / 8.0
4. 글의 구조
   1) 별점/평점 기재 : 별점은 1점은 ★, 0.5점은 ☆로 구성하고, 평점은 10점 만점 중 점수를 기재 (예시 : 평점 : ★★★☆ / 7.0)
   2) 이 영화를 본 이유
     - 린 램지 감독의 영화는 받아들이기 쉽지 않지만 보고 나서 오랬동안 다시 생각나고, 거부할수 없는 작품들이었음
     - 그리고, 평소 좋아하는 제니퍼 로렌스도 나오고 해서 꼭봐야겠다고 생각을 했음
   3) 감독 및 작품이력 소개(적당히)
     - 제작 연도는 제외하고 주요 작품들과 특징들을 언급함
     - 인용하는 작품명은 <>를 사용해서 표시함
   4) 영화의 주요 스토리
     - 이야기를 정리하되 스포일러 없이 적당한 분량으로 작성함
     - 출연한 배우들과 역할에 대해서 간략히 언급 할것
   5) (있다면) 논란이나 이슈가 되고 있는 사항에 대한 소개
     - 중요한 내용이 있지 않으면 이부분 생략 가능
   6) (있다면) 영화의 숨겨진 의미나 상징 같은것들에 대한 해석
     - 중요한 내용이 있지 않으면 이부분 생략 가능
   7) 나의 개인적인 감상   
     - 시간의 순서대로 진행되는 영화가 아니고, 현실과 환상이 모호하게 제시되는 장면들이 적지 않기 때문에 난해하게 느낄수도 있을것 같음
     - 하지만, 사실 감독이 이야기하고자 하는바가 너무 명확해서 난해한 영화라고는 생각하지 않음
     - 문제는 산후 우울증에 처한 이 인물에 대해서 얼마나 공감하고 받아들일수 있느냐 일것 같음
     - 나의 경우는 적극적으로 공감할수 있었음. 물론 내가 직접 출산을 해보지는 않았지만 한 아이의 아빠로서 육아의 시간을 같이 경험해 왔기 때문에 그런것 같음.
     - 내가 페미니스트가 된 이유도 사실 결혼이후 육아를 같이 하면서 직접 피부로 느낀바가 많았기 때문이기도 함
     - 이런 점에서 100% 응원해주고 싶은 영화였음. 정작 당사자인 출산을 앞둔 여성들에게는 공포와 악몽으로 느껴질것 같기도 함
     - 린 램지 감독은 항상 이렇게 우리의 불편한 지점을 건드리지만 나는 항상 응원하고 있음

아래 조건 참조해서 엘레나 페란테의 <잃어버린 아이 이야기>에 대한 글을 작성해줘


---
## 작성 조건

1. 목적 : 블로그 포스트
2. 문장톤 : 과장하지 말고 쿨한톤이지만 존댓말로 작성함. 형용사는 최소한으로 사용하여 작성함.
3. 별점/평점 : ★★★★ / 8.0 (잃어버린 아이 이야기)
                   ★★★★☆ / 9.0 (4부작 전체)
4. 글의 구조
 1) 별점/평점 기재 : 별점은 1점은 ★, 0.5점은 ☆로 구성하고, 평점은 10점 만점 중 점수를 기재 (예시 : 평점: ★★★☆ / 7.0)
 2) 읽게된 계기
   - 드디어 이 끝날것 같지 않던 이야기를 다 읽고 마무리를 하였음
   - 읽는 동안 정말 파란만장한 레누와 릴라의 이야기에 푹 빠져 있었음
 3) 작가 및 작품이력 소개 (아주 간단히)
   - 4부작의 이전 작품들 글에 이미 작가의 이력은 많이 다루어서 간단히만 소개함
   - 이번작품은 특히 엘레나 페란테의 다른 작품인 <잃어버린 사랑>이 왠지 일맥상통하는 면이 있어보여서 자꾸 생각이 났음
 4) 책의 내용 요약 (적당히)
   - 주요 스토리 라인이 명확하게 파악되도록 스토리를 요약해서 설명할것
   - 릴라와 레누의 관계와 아이들의 탄생. 그리고 등장인물들 사이의 관계를 설명하고,
     잃어버리는 사건과 그 이후의 이야기들이 잘 드러나도록 정리 할것
 5) 나의 개인적인 감상
   - 마지막 작품이니까 나폴리 4부작 전체에 대한 이야기를 하고 싶음
   - 드라마를 통해서 처음 이 이야기를 알게 되었지만 소설역시 너무 좋았음.
   - 드라마 <나의 눈부신 친구>가 내 인생 드라마이듯이 소설 나폴리 4부작도 내 독서인생에서 중요한 책이 될것 같음
   - 이탈리아 현대사를 관통하면서 벌어지는 이 파란 만장한 이야기를 읽는 동안 너무 즐거웠음
   - 현학적인 문체가 아니면서도 사실 무거운 문제의식을 다루는 이야기이면서도, 또 한편으로는 아주 개인적이고 내밀한 내면의 이야기이기도 함
   - 어떻게 이렇게 솔직하고 미묘한 사람의 심리를 잘 표현할까 감탄하다가도, 
     격변하는 세상속에서 살아가는 사람들의 모습들을 너무나 흥미롭게 잘 담아 냈다는 점이 경이롭기도 함.
   - 이 책을 읽는 동안 지금 내앞에서 벌어지는 사건들에 릴라라면 어떻게 반응 했을까, 레누라면 어떻게 반응했을까, 
     니노 같은 사람은 내 주변에 누가 있을까 이런 생각을 자주 하게 되었음
   - 한편으로는 릴라가 생각하는 인생의 무의미가 마음속 깊이 공감되기도 하다가, 
     또 한편으로는 그럼에도 불구하고 무의미 속에서 의미를 만들어 가는 사람들에 공감이 가기도 했음.
   - 시골 마을에서 벌어지는 인간군상들의 이야기에 세상어디에서나 사람사는 얘기는 똑같구나 하는 생각이 들기도 했음
   - 아무튼, 내 독서 인생에서도 손에 꼽을수 있는 멋진 작품이었던것 같음
   - 이제 2000페이지가 넘는 이 책을 마무리 했으니 그동안 미뤄놨던 다른 책들도 읽어봐야겠음

아래 조건 참조해서 안톤 후쿠아 감독의 영화 <마이클>에 대한 글을 작성해줘


---
## 작성 조건

1. 목적 : 블로그 포스트
2. 문장톤 
   1) 과장하지 말고 쿨한톤으로 작성함
   2) 형용사는 최소한으로 사용하여 짧은 문장으로 작성함
   3) 반드시 존댓말로 작성함
   4) 외부사이트 링크는 삭제 함
3. 별점/평점 : ★★★ / 6.5
4. 글의 구조
   1) 별점/평점 기재 : 별점은 1점은 ★, 0.5점은 ☆로 구성하고, 평점은 10점 만점 중 점수를 기재 (예시 : 평점 : ★★★☆ / 7.0)
   2) 이 영화를 본 이유
     - 마이클 잭슨에 대한 영화가 만들어진다는 이야를 듣고 작년부터 엄청 기대를 하고 있었음
     - 운좋게 시사회에 당첨이 되서 조금 일찍 볼 수 있었음
   3) 뮤지션 소개 (간략히)
     - 더이상 설명이 필요없는 뮤지션이기는 하지만, 마이클 잭슨의 이력을 간략히 정리함. 
     - 잭슨5 시절과 솔로 데뷔후 성과, We are the world 등 아프리카 구호 프로젝트들을 포함해서 정리함
   4) 감독 및 작품이력 소개
     - 국내에 많이 알려진 주요 작품과 감독의 특징들을 간단히 언급함
     - 구체적인 제작 연도는 제외하고 인용하는 작품명은 <>를 사용해서 표시함
   5) 영화의 주요 스토리
     - 이야기를 정리하되 스포일러 없이 적당한 분량으로 작성함
     - 아버지와의 갈등에 집중하고 있다는 부분 설명
     - 주연 배우의 캐스팅 과정에 대해서 간략히 설명
   6) 나의 개인적인 감상   
     - 솔직히 영화의 시나리오는 참사 수준임. 특A급 재료를 가지고 C급도 안되는 시나리오를 만들었음
     - 그 수많은 이야기거리 중에 아버지와의 대립을 고른것도 별로고, 그 대립을 피상적으로 대충그린것도 매우 수준이하임
     - 기본 플롯이 매우 허접함에도 불구하고, 공연 할때의 무대 연출과 사운드는 최고 였음
     - 다시 듣는 마이클 잭슨의 음악이 너무 좋아서, 영화가 끝나도 엔딩크레딧이 다 올라갈때까지 자리에서 일어나기 싫었음
     - 집에와서 다시 예전 공연영상을 보면서 감탄에 감탄을 더하는 시간을 보내고 있음
     - 요즘 다시 빌보드 차트에도 등장했다는데 정말 그럴만하다고 생각함
     - 뭐 허접하기는 하지만 안보면 후회할것 같기도 하고 여러가지 생각이 듬
     - 개인적으로 바람이 있다면, 특A급 감독과 특A급 시나리오 작가를 투입해서 마이클 잭슨에 대한 영화를 다시 만들었으면 좋겠음
     - 그게 우리의 영원한 스타에 대한 예의 아닐까?

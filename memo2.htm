# <시크릿 에이전트> 리뷰

평점 : ★★★☆ / 7.0

작년부터 이 영화 이야기를 자주 들었습니다. 그래서 꼭 봐야겠다고 생각했네요. 부산영화제에서 먼저 본 지인도 있었습니다. 그 얘기를 듣고 나니 더 빨리 보고 싶어졌네요. 감독의 전작 <바쿠라우>를 놓친 것도 이유였습니다. 이 작품이라도 챙겨 봐야겠다는 마음이 있었습니다.

클레베르 멘돈사 필류 감독은 브라질 헤시피 출신입니다. 대부분의 작품을 고향 헤시피를 배경으로 찍었다고 합니다. 데뷔작 <이웃의 소리>는 중산층 동네의 감시와 불안을 다뤘고, 이후 <아쿠아리우스>에서는 개발 논리에 맞서는 한 여성을 그렸다고 합니다.  <바쿠라우>는 훌리아누 도르넬리스와 공동 연출했고, 칸영화제 심사위원상을 받았습니다. 이후에 다큐멘터리 <픽처스 오브 고스트>도 만들었습니다. 그의 영화는 사회적 긴장과 기억을 주로 다룹니다. 장르적 요소를 섞는 것도 특징이라고 합니다.

이 영화의 배경은 1977년 브라질입니다. 당시 브라질은 군사 독재 아래 있었습니다. 1964년 쿠데타로 시작된 체제였습니다. 감시와 검열, 정치적 탄압이 일상이던 시기였습니다. 

한때 교수였던 주인공은 과거를 숨기고 헤시피로 돌아옵니다. 마침 도시는 카니발 주간입니다. 그는 다른 이름으로 조용히 지내려 합니다. 하지만 곧 자신이 감시당하고 있다는 것을 알게 됩니다. 반체제 인사들의 도움으로 일자리를 얻고, 동시에 자신의 지난 흔적을 좇습니다. 부패한 경찰과 정치인이 그를 압박하고,  도시는 안전한 피난처가 되지 못합니다. 영화는 이 상황을 스릴러의 문법으로 풀어내고 있습니다.

이 영화는 칸영화제에서 감독상과 남우주연상을 함께 받았습니다. 브라질 영화로는 이례적인 성과라고 합니다. 이후 아카데미 후보에도 올랐습니다. 발터 살리스의 <아임 스틸 히어>와 함께, 독재 시기를 다룬 최근 브라질 영화의 흐름 안에서 이야기가 많이 되고 있습니다.

영화는 기억을 중심에 둡니다. 사라진 사람들과 지워진 이야기에 대한 영화입니다.

눈에 띄는 장치중 하나는 상어입니다. 배경이 된 1977년, 브라질에서는 영화 <죠스>가 큰 인기였습니다. 감독은 이 열풍을 시대의 공포를 보여주는 상징으로 씁니다. 극 중에서는 죽은 상어의 배 속에서 사람의 다리가 발견됩니다. 이 다리는 독재 정권에 희생된 사람의 것으로 암시됩니다. 당시 정권은 반대 세력을 살해한 뒤 바다에 버려 흔적을 지웠습니다. 상어는 그 감춰진 시신을 다시 뭍으로 끌어올리는 존재네요. 공포의 상징이던 상어가 오히려 은폐된 진실을 드러내는 셈입니다.

여기서 '털 난 다리'라는 도시 괴담이 이어집니다. 이 괴담은 실제로 1970년대 헤시피에 있던 전설입니다. 검열에 시달리던 기자들이 만든 일종의 암호였습니다. 밤마다 공원에서 사람들을 폭행하던 군경을 빗댄 표현이라고 합니다. 직접 말할 수 없던 국가 폭력을 괴담의 형태로 돌려 말한 것이죠.

극장과 영사기사도 반복해 나옵니다. 영화라는 매체 자체가 기억을 보관한다는 의미로 읽힙니다. 현재 시점을 끌어들이는 액자 구조도 같은 주제를 강조하는 장치로 사용이 되었습니다. 묻으려 해도 다시 떠오르는 진실, 그것이 상어와 다리를 통해서 말하고 싶은 이야기였던것 같습니다.  

개인적으로 브라질 영화는 오랜만이었습니다만, 확실히 브라질만의 분위기가 있네요. 러닝타임이 꽤 긴 편입니다. 그런데 의외로 지루하지 않았네요. 전작 <바쿠라우>는 느린 템포로 알고 있는데, 이번 영화는 조금 의외였습니다. 

이 영화는 문제를 설적으로 드러내지 않습니다. 따라가다 보면 시대상과 하려는 이야기가 은근히 드러나는 방식으로 만들어져 있습니다. 그런 점에서 세련된 방식이라고 생각합니다. 다만 비슷한 서사를 여러 번 본 느낌은 지우기 어려웠네요. 어쩌면 우리도 비슷한 역사를 겪었기 때문에 그렇게 느꼈을것 같기도 합니다. 그리고,이 영화의 액자 구조 역시 완전히 새롭지는 않았네요. 

그래도 전반적으로 재미있게 봤습니다. <바쿠라우>도 OTT에 있는 것 같은데 빨리 챙겨봐야겠네요.

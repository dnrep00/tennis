# <스마일 찰스> 리뷰 - 제30회 부천국제판타스틱영화제

평점 : ★★★☆ / 7.0

솔직히 말하면 시간이 맞고 티켓이 남아있어서 예매를 했습니다. 큰 기대는 없었습니다. 그런데 보기 전날 영화제 시상식에서 이 영화의 주연인 홍서백 배우가 한국영화배우협회 배우상을 수상했다는 소식을 들었습니다. 그 소식을 듣고 나서야 살짝 기대를 하게 되었네요.

오영두 감독은 BIFAN과 이미 여러 번 만난 감독입니다. <에일리언 비키니>, <영건 탐정사무소> 같은 장편, 그리고 옴니버스 영화 <이웃집 좀비> 참여작이 대표작으로 꼽힙니다. 장르적 틀 안에서 유머를 놓치지 않는 스타일이 특징입니다. 이번 <스마일 찰스> 역시 주인공의 허허실실한 연기가 중심에 놓인 작품입니다.

<스마일 찰스>는 한 남자의 몰락과 재기를 다루는 코미디입니다. 주인공은 한때 배우를 꿈꾸던 인물입니다. 하지만 포르노 출연 사실이 알려지면서 모든 걸 잃습니다. 배우로서의 커리어도, 주변 사람들과의 관계도 끊깁니다. 그는 '스마일 찰스'라는 이름으로 정체를 숨기고, 온라인 섹스 노동자로 살아갑니다. 그에게는 남다른 특징이 있습니다. 감정과 표정 사이에 간극이 있습니다. 속마음과 얼굴에 드러나는 표정이 어긋납니다. 이 어색함은 그를 세상과 완전히 단절시킵니다. 사람들과 어울리지 못하고, 홀로 자신만의 방식으로 하루하루를 버팁니다.

그러던 어느 날, 그의 삶에 마리가 등장합니다. 주인공은 어느 날 길거리에서 인형 하나를 마주치는데 그 인형의 이름은 마리입니다. 그리고 얼마 후 우연히 한 여인을 만나게 되는데 이 사람의 이름도 마리입니다. 인형 마리와 묘령의 여인 마리, 이 우연 같지 않은 우연이 이야기 전체를 관통하는 축이 됩니다. 주인공은 두 마리 사이를 오가며 현실과 공상의 경계가 흐려지는 지점에서 이야기가 흘러갑니다.

주인공은 마리가 200억대 사기를 벌인 인물로 의심을 합니다. 그녀가 주인공의 일상에 끼어들면서, 조용하던 그의 삶에 균열이 생기기 시작합니다. 영화는 이 예상치 못한 만남을 통해 주인공이 어떻게 흔들리고, 또 어떻게 반응하는지를 따라갑니다. 감독 특유의 유머와 배우 홍서백의 개성 있는 연기가 이 관계를 이끌어갑니다.

상영이 끝나고 GV가 있었습니다. 덕분에 제작 과정을 직접 들을 수 있었습니다. 시작은 단순했습니다. 오영두 감독 부부와 홍서백 배우가 함께 놀러가려고 계획을 세웠는데, 가는 김에 영화나 한 편 찍어보자는 마음으로 출발한 작품이라고 합니다. 오영두 감독과 장마리아 배우는 부부 사이입니다. 홍서백 배우는 오영두 감독과 이전 작품들을 함께해온 사이입니다. 흥미로운 점은 장마리아 배우입니다. 원래는 영화 분장을 담당하는 스탭으로 일해왔고, 이번 작품에서 처음으로 연기를 했다고 합니다. 이 영화는 이번 부천영화제에서 홍서백 배우가 한국영화배우협회 배우상을, 그리고 NH농협 배급지원상을 함께 받았습니다.

독백 내레이션 위주로 진행되는 이야기인데, 일단 대사가 좋았습니다. 받아 적고 싶은 문장들이 여러 번 나왔었네요. 상을 받은 홍서백 배우의 연기가 무척 인상적이었습니다. 딕션이 좋고 녹음 상태도 훌륭해서 대사가 귀에 쏙쏙 들어왔네요. 반대로 장마리아 배우의 연기는 매우 아마추어적으로 들렸습니다. 그런데 그 점이 오히려 다른 세계에서 온 것 같은 환상적인 느낌을 만들어내더군요. 이건 의심할 나위 없이 감독이 의도한 바일겁니다.  크게 보면 중년 남자의 공상 같은 이야기입니다. 이들과 비슷한 또래라 그런지 저는 이런 공상이 즐거웠습니다. 고통스러운 세상을 온몸으로 부딪혀본 것 같은 대사들이 곳곳에 있었습니다. 세 사람의 나이가 결코 적지는 않겠지만, 오랜만에 재기발랄한 사람들의 의식세계를 경험한 느낌이었습니다. 배급지원상도 받았으니 극장 개봉도 이어질 것 같습니다. 다만 얼마나 많은 사람들에게 이 이야기가 가닿을지는 잘 모르겠습니다. 많은 분들이 보고 저처럼 공감했으면 좋겠습니다.

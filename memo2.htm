AI 블로그 원고 프롬프트 템플릿 – 원고 예시
아래 조건에 맞춰 WordPress 블로그용 원고를 작성해줘.

※ 주의: 실제 출력에서는 “H2”, “H3”, “내용” 같은 문구를 사용하지 말고,  
     SEO용 헤드라인만 자연스럽게 표시된 형태로 구성해줘.

[입력 정보]
- 주제: AI 책쓰기
- 핵심 메시지: AI 책쓰기는 아이디어를 구조화하고 집필 과정을 효율적으로 정리해주는 새로운 집필 방식이다
- 독자층: 글쓰기를 처음 시작하는 예비 작가, 1인 창작자, 실무형 글쓰기 관심자
- 목표 톤: 실전형·분석형, 명확한 해설 중심
- 글 구조: 서론 → 본론(SEO 구조의 헤드라인 중심) → 결론(요약 및 CTA)
- 분량: 3,200~3,500자

[작성 규칙]
- 문장은 ‘한다’ 체로 통일해 작성  
- 서론은 ‘문제 정의 → 독자 니즈 → 글의 방향 제시’ 흐름으로 구성  
- 본문은 SEO 구조(H2/H3)를 유지하되, “H2”, “H3”라는 문구 자체는 글에 나타내지 않음  
- 각 헤드라인 아래에 2~3개의 하위 헤드라인을 배치하고, 단락마다 ‘사례·절차·비교·실사용’ 중 하나의 유형을 활용해 실천 가능한 예시 포함  
- 본문 단락은 4~6문장으로 구성하되, 설명 필요도에 따라 유연하게 조정  
- 과장·모호한 부사·추측성 표현·반복 표현 제거  
- 문장 길이는 기본 18~24단어, 설명·사례 문장은 24~28단어까지 확장 가능  
- 제목(H1)은 핵심 키워드를 앞에 배치하고 12~16자로 작성  
- 결론에는 핵심 요약 2~3줄과 CTA 포함  
- 이미지 포함 시 ALT 태그용 문구도 함께 제시  

[출력 형식]
- 제목(H1)
- 서론
- (SEO 헤드라인 1) + 본문
- (SEO 헤드라인 2) + 본문
- 결론(요약 및 CTA)

※ 다시 한번 강조: 출력 결과에는 “H2”, “H3”, “내용”이라는 단어가 등장하지 않도록 구성.

* 우주카메라 서비스센터 정보
전화번호: 02-777-6677
주소: 서울시 중구 남대문로 12 영화빌딩 505호 (회현역 인근)
영업시간: 평일 09:00 ~ 19:00 (점심시간 12:30 ~ 13:30 / 주말 및 공휴일 휴무) 
약 4만원 정도 예상


=============================================
평점 : ★★★ / 6.5

<극장의 시간들>을 봤습니다. 

처음엔 잘 몰랐는데 이 프로젝트에 윤가은 감독이 참여했다는 사실을 알게 된 이후로 영화를 봐야 겠다고 생각했습니다. 윤가은 감독의 작품이라면 어떻게든 챙겨봐야 하니까요. ㅋㅋ 이번엔 단편 앤솔로지 형식이긴 했지만, 그래도 극장으로 향할 이유는 충분합니다. 

이 영화는 씨네큐브 개관 25주년을 계기로 제작됐습니다. 씨네큐브는 2000년 12월 광화문에 문을 연 예술영화관으로, 25년간 한국 시네필들의 거점이 되어온 공간입니다. 이 극장을 운영하는 티캐스트가 세 감독에게 ‘극장과 영화’를 주제로 단편을 의뢰했고, 그 결과물이 하나의 앤솔로지로 묶였습니다.

이 앤솔리지에 참여한 감독은 이종필 감독, 윤가은 감독, 장건재 감독 이렇게 세명 입니다. 

이종필 감독은 〈삼진그룹 영어토익반〉과 〈탈주〉를 통해 흥행과 평단의 호평을 동시에 얻으며 충무로에서 입지를 다진 감독입니다. 최근 넷플릭스 오리지널 〈파반느〉를 공개하며 멜로 장르에도 도전했습니다. 사회 속 인물들의 현실을 따뜻하면서도 유머러스하게 포착하는 것이 특기입니다.

윤가은 감독은 현재 제가 가장 주목하는 한국 감독입니다. 〈우리들〉, 〈우리집〉, 〈세계의 주인〉으로 이어지는 필모그래피는 일관되게 아이들의 세계를 통해 어른들의 사회를 비추는 작업입니다. 과장이나 감상 없이 관찰 자체로 이야기를 끌어내는 방식이 인상적입니다. 영국 영화 협회 잡지 〈Sight & Sound〉가 선정한 ‘향후 영화의 중심이 될 차세대 감독 10인’에 이름을 올린 바 있습니다.

장건재 감독은 〈한여름의 판타지아〉로 부산국제영화제 감독상을 받으며 주목받았고, 이후 〈한국이 싫어서〉를 부산국제영화제 개막작으로 선보였습니다. 삶의 경계와 전환점에 놓인 인물들을 조용하고 집요하게 관찰하는 스타일이 일관된 작업자입니다.

첫 번째 에피소드 〈침팬지〉 (이종필 감독)는 2000년의 광화문을 배경으로 시작합니다. 영화를 좋아한다는 공통점으로 친해진 고도, 모모, 제제는 헌책방에서 발견한 침팬지 이야기에 함께 빠져듭니다. 그로부터 시간이 흘러 영화감독이 된 고도는 홀로 광화문으로 돌아와 그 시절의 기억을 마주합니다. 이종필 감독 자신의 실제 기억에서 출발한 작품으로, 김대명, 원슈타인, 이수경, 홍사빈이 출연합니다.

두 번째 에피소드 〈자연스럽게〉 (윤가은 감독)는 영화 촬영 현장을 배경으로 합니다. 아이들이 자연스럽게 노는 장면을 찍고 싶은 감독은 “자연스럽게 연기해달라”고 주문하고, 아이들은 그 말의 의미를 고민하기 시작합니다. 창작자로서의 고민을 특유의 방식으로 풀어낸 작품으로, 고아성이 감독 역을 맡았습니다.

세 번째 에피소드 〈영화의 시간〉 (장건재 감독)은 춘천에 사는 중년 여성 영화가 오랜만에 광화문을 찾다가 우연히 들어간 극장에서 수십 년 만에 여고 동창과 재회하는 이야기입니다. 극장이라는 공간이 사람과 사람을 어떻게 다시 이어주는지를 조용하게 담아낸 작품으로, 양말복, 장혜진, 권해효, 김연교, 이주원, 문상훈이 출연합니다.

영화의 프롤로그와 에필로그는 이종필 감독이 연출했습니다. 씨네큐브의 영사기사 홍성희 씨가 두 손을 모으고 상영 상태를 지켜보는 장면, 그리고 젊은 영사기사가 그 옆에서 배우는 장면으로 영화를 열고 닫습니다. 주연 외에도 〈침팬지〉에는 동물원 사육사 역으로 오만석이, 씨네큐브 영사기사 역에 심해인이 등장합니다. 뮤지션 김뜻돌도 짧게 모습을 비춥니다.

이 영화는 씨네큐브에서 봤어야 더 의미가 있을 것 같습니다. 저는 CGV에서 봤고, 그게 약간 아쉽네요. 영화 속에 비치는 씨네큐브 극장을 스크린으로 보면서, 저기서 저 영화를 보고 있었으면 하는 생각이 들었습니다.

세 편의 완성도와 스타일은 꽤 차이가 납니다. 각 감독의 색깔이 또렷한 만큼 앤솔로지로서의 통일감보다는 단편집에 가까운 느낌입니다. 그래도 어느 편이 가장 좋고 나쁘다기보다는, 세 편이 각자의 방식으로 같은 질문을 향해 걸어간다는 느낌이 있었습니다.

20대 때부터 씨네큐브를 꽤 자주 드나들었습니다. 결혼 이후에는 광화문이 집에서 멀어지면서 최근에는 발걸음이 뜸해진 것도 사실입니다. 영화 속 씨네큐브의 구석구석, 계단이나 로비의 질감 같은 것들이 화면에 잡힐 때마다 이상하게 울컥했습니다. 그 공간에 쌓인 시간들이 개인적으로도 참 소중한것 같습니다. 

요즘엔 문을 닫는 극장들도 많은데 씨네큐브는 앞으로도 오래 그 자리에 있어 줬으면 좋겠습니다.

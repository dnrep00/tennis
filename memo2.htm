평점: ★★★ / 6.5

<바로바로 클로드 with 코워크, 스킬, 클로드 코드, 디자인>이란 책을 읽었습니다. 

그동안 회사에서 외부 LLM 접속을 막아뒀습니다. 최근에서야 정책이 풀리면서 챗GPT와 클로드 유료 계정을 쓸 수 있게 됐습니다. 기본 기능은 오래전부터 써고 있었지만, 전체 기능을 잘 활용해 보고 싶어서 책을 하나 읽어봐야 겠다 생각했습니다. 전체적인 그림을 빠르게 파악하고 싶어서 이 책을 골랐습니다.

저자는 차진우라는 분입니다. 골든래빗에서 나왔고 부제 그대로 코워크, 스킬, 클로드 코드, 디자인 네 영역을 다룹니다.

앞부분은 기초를 잡습니다. 인공지능과 에이전트 개념, 커넥터와 플러그인, 아티팩트, 스케줄링, 디스패치, 하네스 같은 용어를 하나씩 짚고 넘어갑니다. 클로드를 처음 쓰는 사람도 따라올 수 있게 쉬운 설명 위주입니다.

중반부터는 실전입니다. 코워크 파트는 클로드 데스크톱 앱으로 폴더 권한을 설정하고, 파일을 직접 열고 수정하고 정리하는 흐름을 다룹니다. PDF 합치기, 문서 서식 일괄 변경, 업무 리포트 자동화 같은 사례가 나옵니다.

스킬 파트는 앤트로픽이 기본 제공하는 스킬을 활성화하고 써보는 과정을 안내합니다. 캔버스 디자인 스킬로 시각 자료를 만드는 예시가 대표적입니다.

클로드 코드 파트는 말로 설명하면 코드를 짜고 실행해서 실제로 작동하는 프로그램을 완성하는 과정을 다룹니다. 타이머나 번역기처럼 간단한 프로그램을 예로 듭니다.

디자인 파트는 랜딩페이지나 슬라이드 같은 결과물을 클로드로 만드는 방법을 소개합니다.

이런 내용을 82가지 활용법으로 쪼개서 단계별로 보여줍니다. 프롬프트 예시도 함께 실려 있습니다.


전체적으로 어떤 서비스가 있고 어떻게 쓰면 되는지 개념을 잡는 데는 도움이 됐습니다. 코워크가 뭔지, 스킬이 뭔지, 클로드 코드가 뭔지 용어만 알던 상태에서 최소한 감은 잡을 수 있었습니다.

다만 각 파트가 얕습니다. 수박 겉핥기라고 해도 반박하기 어렵습니다. 82가지를 한 권에 담다 보니 하나하나 깊이 들어가지는 못합니다.

빠르게 전체 지도를 그리는 용도로는 나쁘지 않습니다. 하지만 프로그램 개발을 위해서 클로드 코드를 실무에서 제대로 쓰고 싶다면 이 책만으로는 부족할것 같네요. 개인적으로 클로드 코드로 개발도 해야되서 클로드 코드만 깊이 다루는 전문 서적을 따로 찾아 봐야 할것 같습니다.

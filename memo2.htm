# 혼자 공부하는 바이브 코딩 with 클로드 코드 - 서평

평점: ★★★☆ / 7.0

클로드 관련 개론서를 하나 읽은 이후에 클로드 코드에 집중해서 공부해야겠다는 생각이 들었습니다. 마침 사람들이 많이 읽는것 같아서 이 책을 골랐습니다.

놀랍게도 저자인 조태호는 인디애나대학교 의과대학 영상의학 및 영상과학과 교수입니다. AI와 딥러닝을 의학 분야에 접목해 알츠하이머병 조기 진단 연구를 이끌고 있습니다. 유전체, 다중오믹스, 의학 영상을 AI로 통합 분석하는 작업에 주력하고 있다고 합니다.

이 책은 15개의 실습 프로젝트로 구성되어 있습니다. 기초, 실전, 확장, 자동화 순서로 난이도가 올라갑니다.

초반에는 클로드 웹 인터페이스로 개인 페이지와 마케팅 포트폴리오를 만듭니다. 이 구간에서 프롬프트 작성법을 자연스럽게 익힙니다.

이후에는 터미널에서 클로드 코드를 직접 사용합니다. 손글씨 인식 프로그램을 만들면서 CLAUDE.md 설정 파일 개념을 배웁니다. 할 일 관리 앱을 모바일과 데스크톱 버전으로 각각 만들면서 세션과 컨텍스트 관리 방법을 익힙니다. 화면을 캡처해서 요구사항을 전달하는 방법도 이 구간에서 다룹니다.

중반부터는 상식 퀴즈 게임, 냉장고를 부탁해 앱 등을 만들며 API 연동과 멀티모달 AI 활용법을 배웁니다. MCP를 이용해 클로드 코드의 한계를 넘어서는 방법도 다룹니다. 쇼핑 리스트 앱을 Playwright로 테스트하고 깃허브에 올린 뒤 Vercel과 Supabase로 배포하는 흐름도 실습합니다.

후반부에서는 AI 에이전트를 여러 개 구성합니다. 기획, 프런트엔드, 백엔드, QA, AI 통합 담당 에이전트를 각각 만들어 작은 개발팀처럼 운영합니다. 이 팀으로 AI 공감 다이어리, PDF 요약 AI, 노션 MCP 연동 프로젝트를 완성합니다.

즉 이 책은 이론을 따로 설명하지 않습니다. 프로젝트를 진행하는 과정 안에 프롬프트 작성법, 세션 관리, API 연동, MCP, 에이전트 협업 같은 개념을 자연스럽게 하나씩 끼워 넣는 구조입니다.

일단 개발자가 아닌 사람도 따라갈 수 있게 쉽게 설명하는 점이 좋았고, 프로젝트를 하나씩 완주하면서 클로드의 기능을 하나둘씩 익히는 구조도 좋았습니다.

다만 CLI 중심으로 설명이 진행되는 점은 참고해야 될것 같네요. VS Code나 다른 앱 UI를 활용하는 내용은 없습니다. 그런데, 2025년 12월에 나온 책인데, 클로드 자체의 발전 속도가 워낙 빨라서 이미 낡은 내용도 꽤 있네요.

결론적으로 충분히 좋은 책입니다. 다만 저는 더 전문적이고 테크니컬한 책이 필요하다는 생각이 들었습니다. 특히 하네스와 방법론을 다루는 책을 더 찾아 봐야겠다는 생각이 드네요.

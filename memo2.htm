# <풍선껌 소녀(Ah Girl)> - BIFAN에서 만난 싱가포르 가족 드라마

평점 : ★★☆ / 5.0

사실 잘 모르는 영화였습니다만 제목에 끌려서 예매했네요. 그런데 알고 보니 원제는 <Ah Girl>이었습니다. 뭔가 낚인 건가? 하는 생각이 조금 들었습니다. ㅠㅠ

연출은 앙 게크 게크 프리실라(Ang Geck Geck Priscilla)라는 감독입니다. 싱가포르 난양이공대에서 영화를 전공했고, 부산 아시아영화아카데미 출신이라고 합니다. 

단편 <Broken Crayon>으로 싱가포르 단편영화제에서 상을 받았고, 이후 <Three Little Pigs>, <Happy Birthday> 같은 단편을 이어서 만들었다고 합니다. 이 작품들은 모두 'Ah Girl 3부작'으로 묶이는데 <풍선껌 소녀>는 그 연장선에 있는 감독의 장편 데뷔작으로 볼수 있을것 같습니다. 

영화의 배경은 1994년 싱가포르입니다. 껌 판매가 금지되던 시기입니다.

주인공은 일곱 살 소녀 스위스위입니다. 반에서 짝사랑하는 남자애가 있고, 학교에서는 몰래 껌 장사도 합니다. 껌은 엄마가 여행 가이드로 일하면서 가끔 구해오는 것입니다.

부모는 별거 중입니다. 아빠는 야간에 해산물 장사를 하고, 엄마는 여행 가이드로 집을 자주 비웁니다. 둘 다 자기 연애와 감정에 더 집중하는 편이고, 스위스위와 다섯 살 동생 아티안은 두 집을 오가며 지냅니다. 할머니가 육아를 도맡지만 벅차 보입니다.

시간이 지날수록 어른들의 문제는 쌓이고, 그 여파는 고스란히 아이들에게 옮겨갑니다. 영화는 이 과정을 아이의 시선으로 따라갑니다. 아이 입장에서 어른들은 솔직하지 않습니다. 상황을 제대로 설명해주지 않고, 그때그때 둘러대는 말로 넘어갑니다. 아이는 그 거짓말들 사이에서 눈치껏 상황을 짜맞추며 자기 나름의 결론을 내립니다. 영화는 이 답답함과 무력감을 담담하게 보여줍니다.

개인적인 감상을 덧붙여 보자면, 아이들은 매우 귀여웠습니다. 두 아역 배우의 연기가 참 사랑스럽더군요. 다만 그 귀여움 뒤에 놓인 이야기는 빈약하게 느껴졌습니다. 문화적인 차이일 수도 있겠다 싶었지만, 아이들을 제외하면 인물들이 너무 전형적으로 그려졌습니다. 특히 부모 캐릭터가 진부하게 느껴졌습니다. 그리고 이 영화 속 남자들은 왜 다들 웃옷을 안 입고 있는 건지 잘 이해가 안 돼더군요 ㅋㅋㅋㅋ

상영 후 GV가 있었는데 시간이 안 맞아서 못 보고 나왔습니다. 그 부분은 좀 아쉬웠네요.

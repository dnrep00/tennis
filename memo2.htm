평점 : ★★★☆ / 7.0

손재곤 감독의 영화 <와일드 씽>을 봤습니다. 

사실 90년대 복고 컨셉 자체에는 별로 끌리지 않아서 관심이 별로 없었습니다. 그 시절 저는 재즈와 록에 빠져 있어서 한국 대중가요에는 전혀 관심이 없었으니까요. 아니, 솔직히 말하자면 싫어했었습니다. 그런데 나이가 드니 과거를 추억하는 영화에 너그러워진 것 같네요. 무엇보다 입소문이 기대 이상으로 좋아서 결국 극장으로 향하게 됐습니다.

손재곤 감독은 <달콤,살벌한 연인>과 <해치지않아> 같은 작품으로 나름 코미디를 주제로 경력을 다져온 사람입니다. 평범한 설정에 엇박자 유머를 얹어 웃음을 만드는 스타일이 특징입니다. <와일드 씽> 역시 그 연장선에 있는 작품인것 같습니다. 

영화의 스토리 라인은 이렇습니다. 한때 가요계를 휩쓸었던 3인조 혼성 댄스 그룹 '트라이앵글'은 예기치 못한 사건으로 하루아침에 해체된 뒤 20년이 흘렀습니다. 리더 황현우(강동원)에게 재기의 기회가 될 공연 제안이 들어오고, 그는 흩어진 멤버들을 찾아 나섭니다. 댄스머신이었던 현우는 지금은 인지도 낮은 방송인, 센터였던 변도미(박지현)는 재벌가 며느리, 래퍼를 꿈꿨던 구상구(엄태구)는 솔로 앨범이 망해 빚더미에 앉은 보험설계사가 되어 있습니다. 여기에 라이벌 발라더 최성곤 역의 오정세, 이들을 캐스팅했던 박용구 역의 신하균이 가세합니다.

이들이 강원 엑스포 유치를 기원하는 무대에 오랜만에 복귀를 하고자 하면서 벌어지는 파란 만장한 이야기 입니다.  

코미디 영화인데 생각했던것 보다 웃음이 빵빵 터집니다. 큰 예술적 야심이 보이는 영화는 아니지만 전체적인 전개가 매끄럽고 사려 깊게 고려가 되었다는 느낌이 들었습니다. 누군가는 이 영화를 만들기 위해 치열하게 고민하고 고쳐 쓰고 백만번은 다듬었겠다는 생각이 들더군요.

소문대로 오정세는 등장할 때마다 웃음이 터집니다. 정말 밈이 될 만하다는 생각이 들었습니다. 걱정했던 박지현은 예쁘고 역할에도 잘 맞는것 같았습니다. 강동원과 엄태구도 그만하면 코믹한 역할을 무난하게 소화했다고 생각합니다. 진지한 영화였다면 이들의 노래 실력과 춤 실력이 문제가 될 수도 있었겠지만, 코미디라서 크게 거슬리지 않았던것 같기도 합니다. 감독이 컨셉과 스토리텔링을 끝까지 잘 잡고, 편집도 노련하게 한 것 같습니다.

다만 현재 흥행 스코어가 120만 정도인 점이 아쉽네요. 코로나 이전이었다면 분명 더 잘됐을 텐데, 안타까운 마음이 드네요. 요즘은 재미있고 웃긴 영상이 유튜브와 OTT에 넘쳐나는 시대인지라 극장 영화가 차지하는 자리도 점점 좁아진것 같습니다. 아무리 세상이 많이 변하긴 했지만 이 영화도 많이 봐줬으면 좋겠다는 생각을 하며 극장을 나왔습니다.
